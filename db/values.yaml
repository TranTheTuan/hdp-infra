# postgres-ha-values.yaml

postgresql:
  replicaCount: 2
  username: "postgres"
  database: "hdp"
  image:
    repository: bitnamilegacy/postgresql-repmgr

pgpool:
  enabled: true
  image:
    repository: bitnamilegacy/pgpool

# =========================================================
# CẤU HÌNH BIẾN PGPOOL THÀNH SERVICE LOADBALANCER
# =========================================================
service:
  type: LoadBalancer
  ports:
    postgresql: "5432"

  # Mẹo chuyên nghiệp cho MetalLB: Gán IP tĩnh
  loadBalancerIP: "192.168.1.202"
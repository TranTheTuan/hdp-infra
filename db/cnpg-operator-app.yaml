apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-pg-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: 0.28.3 # Phiên bản ổn định của chart
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true      # Ép ArgoCD phải tạo xong namespace cnpg-system rồi mới làm việc khác
    - ServerSideApply=true      # CHÌA KHÓA: Sửa tận gốc lỗi quá tải 262144 bytes của CRD